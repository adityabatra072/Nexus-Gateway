version: '3.8'

services:
  # ===== Nexus Gateway =====
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-gateway
    image: nexus-gateway:latest
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-nexus-gateway-super-secret-key-2026-secure}
      - JWT_EXPIRATION=24h
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - USE_MOCK_DATA=true
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== Mock User Service (Example) =====
  # Uncomment to test with actual microservices
  # user-service:
  #   image: mockserver/mockserver:latest
  #   container_name: user-service
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     - MOCKSERVER_SERVER_PORT=3001
  #   networks:
  #     - nexus-network

  # ===== Mock Payment Service (Example) =====
  # payment-service:
  #   image: mockserver/mockserver:latest
  #   container_name: payment-service
  #   ports:
  #     - "3002:3002"
  #   environment:
  #     - MOCKSERVER_SERVER_PORT=3002
  #   networks:
  #     - nexus-network

networks:
  nexus-network:
    driver: bridge
    name: nexus-network
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  gateway-logs:
    driver: local
